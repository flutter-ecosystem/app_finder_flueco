name: app_finder_flueco
description: Minimal dark neumorphic app finder built with Flueco.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.0
  flueco: ^0.0.1-alpha.6
  provider: ^6.1.2
  diacritic: ^0.1.6
  http: ^1.2.2
  messaging: ^0.3.1
  flueco_messaging: ^0.0.1-alpha.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
